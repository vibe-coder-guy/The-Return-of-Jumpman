  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  masterGain.connect(audioCtx.destination);
  if (!musicConnected) {
    try { const src = audioCtx.createMediaElementSource(bgMusic); src.connect(masterGain); musicConnected = true; }
    catch(e) {}
  }
}
function bgmPlay() { if (bgMusic) bgMusic.play().catch(() => {}); }
function bgmStop() { bgMusic.pause(); bgMusic.currentTime = 0; }

function sfx(freq, dur, type, sweep, vol) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(masterGain);
  o.type = type || 'square';
  const t = audioCtx.currentTime;
  o.frequency.setValueAtTime(freq, t);
  if (sweep) o.frequency.linearRampToValueAtTime(sweep, t + dur);
  g.gain.setValueAtTime(vol || 0.25, t);
  g.gain.linearRampToValueAtTime(0, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}

    if (state === 'playing') { state = 'paused'; pauseSelection = 0; bgMusic.pause(); }
    else if (state === 'paused') { state = 'playing'; bgmPlay(); }
  }
  if (e.code === 'KeyQ' && state === 'playing' && player && player.power && player.fireballCooldown <= 0) {

// ── Tile map ───────────────────────────────────
let LW = LEVELS[0].LW;
let tiles = new Uint8Array(LW * LH);

const setTile = (x, y, v) => { if (x>=0&&x<LW&&y>=0&&y<LH) tiles[y*LW+x]=v; };
const getTile = (x, y)    => { if (x<0||x>=LW||y<0||y>=LH) return 1; return tiles[y*LW+x]; };

function buildLevel(lvlIdx) {
  const lvl = LEVELS[lvlIdx];
  LW = lvl.LW;
  tiles = new Uint8Array(LW * LH);
  for (let x = 0; x < LW; x++)
    for (let y = GROUND_Y; y < LH; y++) setTile(x, y, 1);
  for (const [s, e] of lvl.gaps)
    for (let x = s; x <= e; x++)
      for (let y = GROUND_Y; y < LH; y++) setTile(x, y, 0);
  for (const [x, y, w] of lvl.plats)
    for (let i = 0; i < w; i++) setTile(x + i, y, 2);
}

// ── Entity factories ───────────────────────────
const PLAYER_W_SM = 12, PLAYER_H_SM = 16;
const PLAYER_W_BG = 18, PLAYER_H_BG = 24;

function mkPlayer() {
  return {
    x: 2*TILE, y: (GROUND_Y-1)*TILE - PLAYER_H_SM,
    w: PLAYER_W_SM, h: PLAYER_H_SM,
    vx: 0, vy: 0,
    onGround: false, facing: 1,
    anim: 0, invincible: 0, alive: true,
    squash: 0, stretch: 0,
    big: false,
    power: null,          // null | 'fire' | 'ice'
    fireballCooldown: 0,
    hammerTimer: 0, hammerSwingTimer: 0,
  };
}

function growPlayer() {
  if (player.big) return;
  player.big = true;
  player.y -= (PLAYER_H_BG - PLAYER_H_SM);
  player.w = PLAYER_W_BG; player.h = PLAYER_H_BG;
  sfxGrow();

// ── Particles & floating text ──────────────────
let particles = [], floatingTexts = [];
let shakeFrames = 0, shakeMag = 0;
let levelTimer = 360 * 60; // 360 seconds in frames
let deathCause = 'abyss';  // 'abyss' | 'enemy' | 'time'

const MAX_PARTICLES = 80;
const MAX_FLOATS    = 8;
function spawnParticles(x, y, n, col) {
  const room = MAX_PARTICLES - particles.length;
  if (room <= 0) return;
  const count = Math.min(n, room);
  for (let i = 0; i < count; i++)
    particles.push({ x, y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-1, life:15, col });
}
function spawnFloatingText(x, y, text, col) {
  if (floatingTexts.length >= MAX_FLOATS) floatingTexts.shift();
  floatingTexts.push({ x, y, text, col, life:30 });
}
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    if (--p.life <= 0) particles.splice(i, 1);
  }
}
function updateFloatingTexts() {
  for (let i = floatingTexts.length-1; i >= 0; i--) {
    floatingTexts[i].y -= 0.6; floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}

function updateDBBoss() {
  if (!dbBoss) return;
  if (!dbBoss.alive) { if (dbBoss.dying > 0) dbBoss.dying--; return; }

  // Tick timers
  if (dbBoss.shield > 0) dbBoss.shield--;
  if (dbBoss.growlTimer > 0) dbBoss.growlTimer--;
  if (dbBoss.growlTimer <= 0) {
    sfxBossGrowl();
    dbBoss.growlTimer = 180 - dbBoss.rage * 12;
  }

  // Continuous rumble while boss is alive
  const rumbleMag = 1 + Math.min(dbBoss.rage, 6) * 0.4;
  if (frameN % 3 === 0) { shakeFrames = 4; shakeMag = rumbleMag; }

  // Boss stays put — only gravity, no horizontal movement
  dbBoss.vx = 0;
  dbBoss.facing = (player.x + player.w/2) < (dbBoss.x + dbBoss.w/2) ? -1 : 1;
  dbBoss.anim = (dbBoss.anim + 0.08 + dbBoss.rage * 0.012) % 4;
  moveEntity(dbBoss);

  // AI: throw barrels toward player — rate scales with rage
  dbBoss.barrelTimer--;
  const barrelRate = Math.max(55, 150 - dbBoss.rage * 11);
  if (dbBoss.barrelTimer <= 0) {
    dbBoss.barrelTimer = barrelRate;
    const bvx = (player.x < dbBoss.x ? -1 : 1) * (3.5 + dbBoss.rage * 0.3);
    barrels.push(mkBarrel(dbBoss.x + (bvx < 0 ? -12 : dbBoss.w), dbBoss.y + 10, bvx));
    if (dbBoss.rage >= 5) {
      barrels.push(mkBarrel(dbBoss.x + dbBoss.w/2 - 6, dbBoss.y + 4, bvx * 0.75));
    }
    sfxHammerSwing();
    spawnFloatingText(dbBoss.x + dbBoss.w/2, dbBoss.y - 12, 'BARREL!', '#ff8800');
  }

  // AI: spawn minion donkeys — faster with rage
  dbBoss.minionTimer--;
  const minionRate = Math.max(120, 300 - dbBoss.rage * 20);
  if (dbBoss.minionTimer <= 0) {
    dbBoss.minionTimer = minionRate;
    spawnMinion();
    if (dbBoss.rage >= 7) spawnMinion(); // double spawn at high rage
    spawnFloatingText(dbBoss.x + dbBoss.w/2, dbBoss.y - 24, 'GET HIM!', '#ff6600');
  }

  // Check stomp by player — boss can be stomped regardless of position
  const stompVy = player.vy;
  const stompBottom = player.y + player.h - stompVy;
  if (hit(player, dbBoss)) {
    if (stompVy > 1 && stompBottom <= dbBoss.y + 10) {
      if (dbBoss.shield > 0) {
        // Shield active — knock player back, no damage
        const pushDir = player.x < dbBoss.x ? -1 : 1;
        player.vx = pushDir * -7;
        player.vy = -8;
        sfxShieldBlock();
        shakeFrames = 5; shakeMag = 3;
        spawnParticles(dbBoss.x + dbBoss.w/2, dbBoss.y, 10, '#00aaff');
        spawnFloatingText(dbBoss.x + dbBoss.w/2, dbBoss.y - 8, 'BLOCKED!', '#00ccff');
      } else {
        // Stomp lands — damage, rage up, shield activates
        dbBoss.stomps++;
        dbBoss.hp--;
        dbBoss.rage = Math.min(9, dbBoss.rage + 1);
        dbBoss.shield = 300;
        player.vy = -9;
        sfxBossStomped();
        sfxBossRage();
        shakeFrames = 8; shakeMag = 4;
        spawnParticles(dbBoss.x + dbBoss.w/2, dbBoss.y, 14, '#ff6600');
        sfxShieldActivate();
        if (dbBoss.hp <= 0) {
          dbBoss.alive = false; dbBoss.dying = 60;
          sfxWin(); sfxBossRoar();
          spawnParticles(dbBoss.x + dbBoss.w/2, dbBoss.y + dbBoss.h/2, 40, '#ff6600');
          spawnFloatingText(dbBoss.x + dbBoss.w/2, dbBoss.y - 20, 'DB DEFEATED!', '#ffff00');
          score += 5000;
        } else {
          spawnFloatingText(dbBoss.x + dbBoss.w/2, dbBoss.y - 8, `${dbBoss.hp} LEFT! RAGE!`, '#ff4400');
        }
      }
    }
    // No body contact damage — boss is stationary, minions do the killing
  }
}

function updateBarrels() {
  for (let i = barrels.length - 1; i >= 0; i--) {
    const b = barrels[i];

    // Straight horizontal movement — no gravity, no bouncing
    b.x += b.vx;
    b.life--;
    if (b.life <= 0) { barrels.splice(i, 1); continue; }
    // Hit player
    if (player.invincible <= 0 && hit(player, b)) {
      barrels.splice(i, 1);
      if (player.power !== null) {
        player.power = null; player.invincible = 180; sfxShrink();
        spawnFloatingText(player.x+player.w/2, player.y-8, 'POWER LOST!', '#ff8800');
        player.vx = (player.x < b.x ? -1 : 1) * 4; player.vy = -3;
      } else if (player.big) {
        shrinkPlayer();
        player.vx = (player.x < b.x ? -1 : 1) * 4; player.vy = -3;
      } else {
        const pushDir = player.x < b.x ? -1 : 1;
        deathCause = 'enemy'; killPlayer(pushDir * 5, -9);
      }
      continue;
    }
  }
}

function drawDBBoss() {
  if (!dbBoss) return;
  if (!dbBoss.alive && dbBoss.dying <= 0) return;
  const sx = Math.round(dbBoss.x - camera.x), sy = Math.round(dbBoss.y);
  if (sx < -80 || sx > W + 80) return;
  if (!dbBoss.alive && dbBoss.dying > 0) {
    ctx.save(); ctx.translate(sx + dbBoss.w/2, sy + dbBoss.h);
    const t = 1 - dbBoss.dying/60;
    ctx.scale(1 + t*2, Math.max(0.01, 1 - t*1.5));
    ctx.fillStyle = '#aa5500'; ctx.fillRect(-dbBoss.w/2, -dbBoss.h, dbBoss.w, dbBoss.h);
    ctx.restore(); return;
  }

  const fr = Math.floor(dbBoss.anim) % 2;
  ctx.save();
  if (dbBoss.facing === -1) { ctx.translate(sx + dbBoss.w, sy); ctx.scale(-1, 1); }
  else ctx.translate(sx, sy);

  // Giant donkey body (scale ~2x normal donkey)
  // Ears
  px(5,-18,10,18,'#aa5500'); px(28,-18,10,18,'#aa5500');
  px(7,-14,6,12,'#ffaa55'); px(30,-14,6,12,'#ffaa55');
  // Body
  px(2,-4,44,26,'#cc7700');
  px(0,8,18,18,'#ffaa55'); // face
  px(2,14,6,4,'#000'); px(10,14,6,4,'#000'); // nostrils
  px(4,24,4,4,'#fff'); px(10,24,4,4,'#fff'); // teeth
  // Eyes
  px(28,0,12,8,'#fff'); px(30,2,8,6,'#000');
  // Nose bridge
  px(36,-4,12,6,'#000');
  // Torso legs
  px(-4,22,56,28,'#aa5500');
  px(0,24,48,20,'#cc7700');
  px(8,30,28,16,'#ffaa00');
  const la = fr === 0 ? 4 : -4;
  px(4,50+la,16,14,'#663300'); px(28,50-la,16,14,'#663300');
  px(2,64+la,18,6,'#000');    px(26,64-la,18,6,'#000');
  // Tail
  px(48,28,10,6,'#aa5500'); px(54,34,8,8,'#aa5500');

  // "DB" bandana — color shifts red→orange with rage
  const bandanaR = Math.min(255, 200 + dbBoss.rage * 6);
  const bandanaG = Math.max(0,   30  - dbBoss.rage * 3);
  px(2, 2, 42, 10, `rgb(${bandanaR},${bandanaG},0)`);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('DB', 14, 10);

  // Shield spike icon when active (drawn in boss-local coords)
  if (dbBoss.shield > 0) {
    const pulse = 0.6 + 0.4 * Math.sin(frameN * 0.25);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#00ccff';
    // Spike on top of head
    ctx.beginPath(); ctx.moveTo(24, -22); ctx.lineTo(18, -32); ctx.lineTo(30, -32); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // HP bar
  ctx.restore();

  // Shield forcefield (drawn in screen coords)
  if (dbBoss.shield > 0) {
    const pulse = 0.35 + 0.25 * Math.sin(frameN * 0.3);
    const shieldAlpha = Math.min(1, dbBoss.shield / 60) * pulse + 0.15;
    ctx.save();
    ctx.globalAlpha = shieldAlpha;
    const scx = sx + dbBoss.w/2, scy = sy + dbBoss.h/2;
    const sw = dbBoss.w/2 + 10, sh = dbBoss.h/2 + 8;
    ctx.fillStyle = '#003355';
    ctx.fillRect(scx - sw, scy - sh, sw*2, sh*2);
    ctx.strokeStyle = '#00eeff';
    ctx.lineWidth = 2;
    ctx.strokeRect(scx - sw, scy - sh, sw*2, sh*2);
    ctx.restore();

    // Shield countdown text
    const shieldSecs = Math.ceil(dbBoss.shield / 60);
    ctx.fillStyle = '#00eeff'; ctx.font = 'bold 8px monospace';
    ctx.fillText(`SHIELD ${shieldSecs}s`, sx + dbBoss.w/2 - 20, sy - 20);
  }

  // HP bar — color shifts green→yellow→red with damage
  const hpPct = dbBoss.hp / dbBoss.maxHp;
  const hpCol = hpPct > 0.6 ? '#00cc00' : hpPct > 0.3 ? '#ffcc00' : '#ff2200';
  ctx.fillStyle = '#000'; ctx.fillRect(sx, sy - 14, dbBoss.w, 8);
  ctx.fillStyle = hpCol; ctx.fillRect(sx, sy - 14, dbBoss.w * hpPct, 8);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(sx, sy - 14, dbBoss.w, 8);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 7px monospace';
  ctx.fillText(`${dbBoss.hp}/${dbBoss.maxHp}`, sx + dbBoss.w/2 - 12, sy - 7);

  // Rage flames at high rage
  if (dbBoss.rage >= 4) {
    const flicker = (frameN >> 2) & 1; // cheap 0/1 flicker at 15fps
    for (let i = 0; i < dbBoss.rage - 3; i++) {
      const fx = sx + 6 + i * 10 + (flicker ? 2 : 0);
      const fy = sy - 20 - (flicker ? 3 : 0);
      ctx.fillStyle = '#ff6600'; ctx.fillRect(fx, fy, 4, 8);
      ctx.fillStyle = '#ffdd00'; ctx.fillRect(fx+1, fy+2, 2, 4);
    }
  }
}

function drawBarrels() {
  for (const b of barrels) {
    const sx = Math.round(b.x - camera.x);
    if (sx < -20 || sx > W + 20) continue;
    const sy = Math.round(b.y);
    const rot = (b.x / 30) % (Math.PI * 2);
    ctx.save();
    ctx.translate(sx + b.w/2, sy + b.h/2);
    ctx.rotate(rot * (b.vx > 0 ? 1 : -1));
    ctx.fillStyle = '#8B4513'; ctx.fillRect(-6, -6, 12, 12);
    ctx.fillStyle = '#663300'; ctx.fillRect(-6, -2, 12, 4);
    ctx.fillStyle = '#aaa';    ctx.fillRect(-7, -7, 14, 2);
    ctx.fillStyle = '#aaa';    ctx.fillRect(-7,  5, 14, 2);
    ctx.restore();
  }
}

// ── Physics ────────────────────────────────────
function moveEntity(e) {
  e.vy = Math.min(e.vy + GRAV, 20);
  e.x += e.vx;
  const cx = e.vx >= 0 ? e.x+e.w-1 : e.x;
  for (let ty = Math.floor(e.y/TILE); ty <= Math.floor((e.y+e.h-1)/TILE); ty++) {
    if (getTile(Math.floor(cx/TILE), ty) > 0) {
      e.x = e.vx >= 0 ? Math.floor(cx/TILE)*TILE-e.w : (Math.floor(cx/TILE)+1)*TILE;
      e.vx = 0; break;
    }
  }
  e.y += e.vy; e.onGround = false;
  const cy = e.vy >= 0 ? e.y+e.h : e.y;
  for (let tx = Math.floor(e.x/TILE); tx <= Math.floor((e.x+e.w-1)/TILE); tx++) {
    if (getTile(tx, Math.floor(cy/TILE)) > 0) {
      if (e.vy >= 0) { e.y = Math.floor(cy/TILE)*TILE-e.h; e.onGround = true; }
      else            { e.y = (Math.floor(cy/TILE)+1)*TILE; }
      e.vy = 0; break;
    }
  }
}

function hit(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ── Kill animation ─────────────────────────────
function killPlayer(kickVx, kickVy) {
  sfxDeath(); bgmStop(); shakeFrames = 14; shakeMag = 4;
  player.vx = kickVx !== undefined ? kickVx : player.vx;
  player.vy = kickVy !== undefined ? kickVy : player.vy;
  player.onGround = false;
  player.alive = true; // keep drawing
  player.dyingAngle = 0;
  state = 'dying';
}

// ── Update ─────────────────────────────────────
function update() {
  if (state === 'dying') {
    player.vy += GRAV;
    player.x  += player.vx;
    player.y  += player.vy;
    player.dyingAngle = (player.dyingAngle || 0) + 0.18;
    updateParticles(); updateFloatingTexts();
    if (shakeFrames > 0) { shakeFrames--; }
    // Once player has fallen well past the bottom of the screen, show dead overlay
    if (player.y > H + 80) { state = 'dead'; }
    return;
  }
  if (state !== 'playing') return;
  frameN++;
  updateParticles();
  updateFloatingTexts();
  tickGlitches();

  if (player.fireballCooldown > 0) player.fireballCooldown--;

  // Player movement
  const spd = 3.0;
  if (keys['ArrowLeft']  || keys['KeyA']) { player.vx = -spd; player.facing = -1; }
  else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = spd; player.facing = 1; }
  else { player.vx *= 0.72; if (Math.abs(player.vx) < 0.1) player.vx = 0; }

  if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
    player.vy = -12.75; player.onGround = false; player.stretch = 4; sfxJump();
  }

  const wasOnGround = player.onGround;
  moveEntity(player);
  if (!wasOnGround && player.onGround) {
    player.squash = 6; sfxLand();
    spawnParticles(player.x+player.w/2, player.y+player.h, 4, '#ffffff');
  }
  if (player.squash > 0) player.squash--;
  if (player.stretch > 0) player.stretch--;
  if (player.x < 0) player.x = 0;
  if (player.invincible > 0) player.invincible--;
  player.anim = (player.anim + (Math.abs(player.vx) > 0.3 ? 0.2 : 0)) % 4;

  // Fall — trigger when feet cross the bottom of the canvas
  if (player.y + player.h > H) {
    deathCause = 'abyss';
    sfxDeath(); bgmStop(); shakeFrames = 12; shakeMag = 3;
    state = 'dead'; return;
  }

  // Level timer
  if (levelTimer > 0) {
    levelTimer--;
  } else {
    deathCause = 'time';
    sfxDeath(); bgmStop(); shakeFrames = 12; shakeMag = 3;
    state = 'dead'; return;
  }

  // Win
  if (player.x > (LW - 3) * TILE) {
    if (currentLevel === 4 && (!dbBoss || dbBoss.alive)) {
      // Level 5: must collect blue mushroom and defeat DB boss first
      const msg = !dbBoss ? 'FIND THE BLUE MUSHROOM!' : 'DEFEAT DB BOSS!';
      spawnFloatingText(player.x + player.w/2, player.y - 16, msg, '#ff0000');
    } else {
      sfxWin(); bgmStop();
      if (currentLevel + 1 > unlockedLevels - 1 && currentLevel + 1 < LEVELS.length)
        unlockedLevels = currentLevel + 2;
      state = 'win'; return;
    }
  }

  const stompVy     = player.vy;
  const stompBottom = player.y + player.h - stompVy;

  // Donkeys
  for (const d of donkeys) {
    if (!d.alive) { if (d.dying > 0) d.dying--; continue; }
    if (!d.active && Math.abs(d.x - player.x) < 550) d.active = true;
    if (!d.active) continue;

    if (d.frozen > 0) {
      d.frozen--;
      d.vx = 0;
      moveEntity(d);
      if (d.y > LH*TILE+40) { d.alive = false; continue; }
      // Frozen: any contact kills
      if (hit(player, d)) {
        d.alive = false; d.dying = 25; player.vy = -6; score += 300;
        spawnGlitchGhost(d);
        sfxDonkeyDeath();
        spawnParticles(d.x+d.w/2, d.y+d.h/2, 10, '#44ccff');
        spawnFloatingText(d.x+d.w/2, d.y, '+300 ICE!', '#44ccff');
        shakeFrames = 3; shakeMag = 2;
      }
      continue;
    }

    const dx = player.x - (d.x + d.w/2 - player.w/2);
    const dy = player.y - d.y;
    d.facing = dx > 0 ? 1 : -1;
    d.vx = d.facing * d.speed;
    d.jumpCooldown--;
    if (d.onGround && d.jumpCooldown <= 0) {
      let shouldJump = false;
      if (dy < -32 && Math.abs(dx) < 240) shouldJump = true;
      if (!shouldJump) {
        const probeX = d.x + (d.facing > 0 ? d.w+2 : -4);
        const pTx = Math.floor(probeX/TILE), pTy = Math.floor((d.y+d.h+8)/TILE);
        if (getTile(pTx, pTy)===0 && getTile(pTx, pTy+1)===0) shouldJump = true;
      }
      if (!shouldJump) {
        const wallX = d.x + (d.facing > 0 ? d.w+1 : -2);
        if (getTile(Math.floor(wallX/TILE), Math.floor((d.y+d.h/2)/TILE)) > 0) shouldJump = true;
      }
      if (shouldJump) { d.vy = d.jumpVy; d.jumpCooldown = 40 + Math.random()*40; sfxDonkeyGrunt(); }
    }
    moveEntity(d);
    if (d.y > LH*TILE+40) { d.alive = false; continue; }
    d.anim = (d.anim + 0.18) % 4;

    if (hit(player, d)) {
      if (stompVy > 1 && stompBottom <= d.y + 8) {
        // Stomp always works (even when invincible)
        d.alive = false; d.dying = 25; player.vy = -9; score += 200;
        sfxStomp(); sfxDonkeyDeath();
        spawnParticles(d.x+d.w/2, d.y+d.h/2, 8, '#ff6600');
        spawnFloatingText(d.x+d.w/2, d.y, '+200', '#ff6600');
        shakeFrames = 4; shakeMag = 2;
      } else if (player.invincible > 0) {
        // Spawn invincibility: donkey can't hurt player, pass harmlessly
      } else if (player.hammerTimer > 0) {
        d.alive = false; d.dying = 25; score += 200;
        sfxDonkeyDeath();
        spawnParticles(d.x+d.w/2, d.y+d.h/2, 8, '#ff6600');
      } else if (player.power !== null) {
        // Has fire/ice power: lose power, stay big, invincible
        player.power = null;
        player.invincible = 180;
        sfxShrink();
        spawnFloatingText(player.x+player.w/2, player.y-8, 'POWER LOST!', '#ff8800');
        const pushDir = player.x < d.x ? -1 : 1;
        player.vx = pushDir * 4; player.vy = -3;
        d.x += d.facing * 10;
        shakeFrames = 6; shakeMag = 2;
      } else if (player.big) {
        // Big but no power: shrink, invincible
        shrinkPlayer();
        const pushDir = player.x < d.x ? -1 : 1;
        player.vx = pushDir * 5; player.vy = -4;
        d.x += d.facing * 10;
        shakeFrames = 8; shakeMag = 3;
        spawnFloatingText(player.x+player.w/2, player.y-4, 'OUCH!', '#ff8800');
      } else {
        // Small: death with knockback
        const pushDir = player.x < d.x ? -1 : 1;
        deathCause = 'enemy'; killPlayer(pushDir * 5, -9); return;
      }
    }
  }

  // Hammer timer
  if (player.hammerTimer > 0) {
    player.hammerTimer--;
    player.hammerSwingTimer--;
    if (player.hammerSwingTimer <= 0) { doHammerSwing(); player.hammerSwingTimer = 60; }
  }

  // Fireballs
  for (let i = fireballs.length-1; i >= 0; i--) {
    const fb = fireballs[i];
    fb.x += fb.vx; fb.life--;
    const ftx = Math.floor((fb.x + (fb.vx > 0 ? fb.w : 0)) / TILE);
    const fty = Math.floor((fb.y + fb.h/2) / TILE);
    if (getTile(ftx, fty) > 0 || fb.life <= 0 || fb.x < -20 || fb.x > LW*TILE+20) {
      spawnParticles(fb.x+fb.w/2, fb.y+fb.h/2, 4, fb.kind==='fire' ? '#ff6600' : '#44ccff');
      fireballs.splice(i, 1); continue;
    }
    let hit_donkey = false;
    for (const d of donkeys) {
      if (!d.alive || !hit(fb, d)) continue;
      if (fb.kind === 'fire') {
        d.alive = false; d.dying = 25; score += 300;
        sfxFireHit(); sfxDonkeyDeath();
        spawnParticles(d.x+d.w/2, d.y+d.h/2, 10, '#ff6600');
        spawnFloatingText(d.x+d.w/2, d.y, '+300', '#ff8800');
      } else {
        // Ice: freeze for 5 seconds, don't kill
        d.frozen = 300;
        sfxIceHit();
        spawnParticles(d.x+d.w/2, d.y+d.h/2, 8, '#44ccff');
        spawnFloatingText(d.x+d.w/2, d.y, 'FROZEN!', '#44ccff');
      }
      fireballs.splice(i, 1); hit_donkey = true; break;
    }
    if (hit_donkey) continue;
  }

  // Coins
  for (const c of coins) {
    if (c.got) continue;
    c.anim = (c.anim + 0.1) % 4;
    if (hit(player, c)) {
      c.got = true; score += 10; sfxCoin();
      spawnParticles(c.x, c.y+4, 6, '#ffff00');
      spawnFloatingText(c.x, c.y, '+10', '#ffff00');
    }
  }

  // Powerups
  for (const pu of powerups) {
    if (pu.got) continue;
    pu.anim = (pu.anim + 0.08) % 4;
    if (hit(player, pu)) {
      pu.got = true;
      if (pu.kind === 'redFlower' || pu.kind === 'iceFlower') {
        const newPower = pu.kind === 'redFlower' ? 'fire' : 'ice';
        const col = newPower === 'fire' ? '#ff6600' : '#44ccff';
        if (!player.big) growPlayer();
        player.power = newPower;
        sfxPowerup();
        spawnParticles(pu.x+pu.w/2, pu.y+pu.h/2, 10, col);
        spawnFloatingText(pu.x+pu.w/2, pu.y, newPower==='fire'?'FIRE!':'ICE!', col);
      } else if (pu.kind === 'hammer') {
        player.hammerTimer = 600; player.hammerSwingTimer = 60;
        sfxHammerPickup();
        spawnParticles(pu.x+pu.w/2, pu.y+pu.h/2, 10, '#cc8800');
        spawnFloatingText(pu.x+pu.w/2, pu.y, 'HAMMER!', '#ffaa00');
      } else if (pu.kind === 'redMushroom') {
        if (!player.big) growPlayer();
        else { sfxPowerup(); spawnFloatingText(pu.x+pu.w/2, pu.y, 'BIG!', '#ff4444'); }
        spawnParticles(pu.x+pu.w/2, pu.y+pu.h/2, 10, '#ff4444');
      } else if (pu.kind === 'blueMushroom') {
        if (player.big) shrinkPlayer();
        spawnParticles(pu.x+pu.w/2, pu.y+pu.h/2, 14, '#0088ff');
        spawnFloatingText(pu.x+pu.w/2, pu.y, 'DB BOSS!', '#ff0000');
        spawnDBBoss(pu.x + 200);
      }
    }
  }

  // DB Boss + barrels
  if (state === 'playing') {
    updateDBBoss();
    updateBarrels();
  }

  camera.x = Math.max(0, Math.min(player.x - W/2 + player.w/2, LW*TILE - W));
  if (shakeFrames > 0) shakeFrames--;
}

// ── Death donkey horde ─────────────────────────

// ── Drawing ────────────────────────────────────
function px(x, y, w, h, col) { ctx.fillStyle = col; ctx.fillRect(x, y, w, h); }
let _cachedFont = '';
function txt(str, x, y, size, col, shadow) {
  const f = `bold ${size}px monospace`;
  if (f !== _cachedFont) { ctx.font = f; _cachedFont = f; }
  if (shadow) { ctx.fillStyle = '#000'; ctx.fillText(str, x+2, y+2); }
  ctx.fillStyle = col; ctx.fillText(str, x, y);
}

function drawTile(tx, ty, type) {
  const sx = tx*TILE - camera.x, sy = ty*TILE;
  if (sx+TILE < 0 || sx > W) return;
  if (type === 1) {
    px(sx, sy, TILE, TILE, '#350aad');
  } else if (type === 2) {
    if (platformImg.complete && platformImg.naturalWidth > 0)
      ctx.drawImage(platformImg, sx, sy, TILE, TILE);
    else px(sx, sy, TILE, TILE, '#909090');
  }
}

function drawPlayer() {
  if (!player.alive) return;
  if (player.invincible > 0 && Math.floor(player.invincible/6) % 2 && state !== 'dying') return;

  const sx  = Math.round(player.x - camera.x);
  const sy  = Math.round(player.y);

  // Spinning death animation
  if (state === 'dying') {
    const cx = sx + player.w/2, cy = sy + player.h/2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(player.dyingAngle || 0);
    ctx.fillStyle = player.big ? '#e04000' : '#cc3300';
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    // eyes X X
    ctx.fillStyle = '#fff';
    const ew = 4, eh = 4;
    ctx.fillRect(-6, -player.h/4, ew, eh);
    ctx.fillRect(2,  -player.h/4, ew, eh);
    ctx.fillStyle = '#000';
    ctx.fillRect(-5, -player.h/4+1, 2, 2);
    ctx.fillRect(3,  -player.h/4+1, 2, 2);
    // X marks
    ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-7,-player.h/4); ctx.lineTo(-3,-player.h/4+4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3,-player.h/4); ctx.lineTo(-7,-player.h/4+4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1, -player.h/4); ctx.lineTo(5,-player.h/4+4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5, -player.h/4); ctx.lineTo(1,-player.h/4+4); ctx.stroke();
    ctx.restore();
    return;
  }
  const run = Math.abs(player.vx) > 0.3;
  const air = !player.onGround;
  const wf  = Math.floor(player.anim) % 2;
  const sc  = player.big ? 1.5 : 1.0;

  // Tint based on power
  const powerTint = player.power === 'fire' ? 'rgba(255,100,0,0.25)'
                  : player.power === 'ice'  ? 'rgba(100,200,255,0.25)' : null;

  ctx.save();
  ctx.translate(sx + player.w/2, sy + player.h);
  if (player.squash > 0) {
    const t = player.squash/6; ctx.scale(sc*(1+0.2*t), sc*(1-0.2*t));
  } else if (player.stretch > 0) {
    const t = player.stretch/4; ctx.scale(sc*(1-0.15*t), sc*(1+0.15*t));
  } else {
    ctx.scale(sc, sc);
  }
  if (player.facing === -1) ctx.scale(-1, 1);

  const p = (x, y, w, h, c) => { ctx.fillStyle = c; ctx.fillRect(x, y-player.h, w, h); };
  const bob = run && !air && wf===1 ? 1 : 0;
  const la  = run && !air ? (wf===0 ? 2 : -2) : 0;

  if (air) {
    p(-6,11,4,3,'#0000aa'); p(-7,14,6,3,'#000');
    p( 2,11,4,3,'#0000aa'); p( 2,14,6,3,'#000');
  } else {
    p(-5,11+bob+la,4,4,'#0000aa'); p(-6,15+bob+la,6,3,'#000');
    p( 1,11+bob-la,4,4,'#0000aa'); p( 0,15+bob-la,6,3,'#000');
  }
  p(-5, 5+bob,10,7,'#ff6600'); p(-5, 5+bob,10,2,'#0000aa');
  p(-5,10+bob, 4,2,'#0000aa'); p( 1,10+bob, 4,2,'#0000aa');
  p(-4,-1+bob, 8,7,'#ffaa55'); p( 1, 0+bob, 2,2,'#000');
  p(-1, 3+bob, 3,2,'#cc7040'); p(-2, 4+bob, 7,2,'#000');
  p(-6,-2+bob,12,2,'#ff0000'); p(-4,-6+bob, 8,5,'#ff0000');

  // Power glow
  if (powerTint) {
    ctx.fillStyle = powerTint;
    ctx.fillRect(-6, -player.h, 14, player.h);
  }

  // Hammer — 2-frame animation at 6fps (every 10 game frames)
  if (player.hammerTimer > 0) {
    const hamFrame = Math.floor(frameN / 10) % 2; // 0=up, 1=smash
    ctx.save(); ctx.translate(6, -10-bob);
    if (hamFrame === 0) {
      // Frame 0: hammer held up
      ctx.fillStyle = '#8B4513'; ctx.fillRect(-1, -10, 3, 12);
      ctx.fillStyle = '#888';    ctx.fillRect(-5, -16, 12, 6);
      ctx.fillStyle = '#aaa';    ctx.fillRect(-4, -18, 10, 3);
    } else {
      // Frame 1: hammer smashing down
      ctx.fillStyle = '#8B4513'; ctx.fillRect(-1, 0, 3, 10);
      ctx.fillStyle = '#888';    ctx.fillRect(-5,  8, 12, 6);
      ctx.fillStyle = '#aaa';    ctx.fillRect(-4,  6, 10, 3);
    }
    ctx.restore();
  }

  ctx.restore();
}

function drawDonkey(d) {
  if (!d.alive && d.dying <= 0) return;
  const sx = Math.round(d.x - camera.x), sy = Math.round(d.y);
  if (sx < -60 || sx > W+60) return;
  // NES sprite flicker: when 5+ donkeys on screen, random ones drop frames
  const visibleCount = donkeys.filter(x => x.alive && Math.abs(x.x - camera.x - W/2) < W).length;
  if (visibleCount >= 5 && d.alive && Math.random() < 0.12) return;
  if (!d.alive && d.dying > 0) {
    ctx.save(); ctx.translate(sx+d.w/2, sy+d.h); ctx.scale(1.7, 0.12);
    px(-d.w/2,-d.h, d.w, d.h, '#aa5500'); ctx.restore(); return;
  }
  const fr = Math.floor(d.anim)%2, la = fr===0 ? 2 : -2;
  const blink = (frameN + Math.floor(d.x/TILE)*17) % 120 < 2;
  ctx.save();
  if (d.facing===-1) { ctx.translate(sx+d.w, sy); ctx.scale(-1,1); } else ctx.translate(sx,sy);
  px(3,-9,5,9,'#aa5500'); px(14,-9,5,9,'#aa5500');
  px(4,-7,3,6,'#ffaa55'); px(15,-7,3,6,'#ffaa55');
  px(1,-2,22,13,'#cc7700');
  px(0,4,9,9,'#ffaa55'); px(1,7,3,2,'#000'); px(5,7,3,2,'#000');
  px(2,12,2,2,'#fff'); px(5,12,2,2,'#fff');
  if (!blink) { px(13,0,6,4,'#fff'); px(14,1,4,3,'#000'); } else px(13,2,6,2,'#cc7700');
  px(18,-2,6,3,'#000');
  px(-2,11,28,14,'#aa5500'); px(0,13,24,10,'#cc7700'); px(4,15,14,8,'#ffaa00');
  px(2,25+la,8,7,'#663300'); px(14,25-la,8,7,'#663300');
  px(1,32+la,9,3,'#000');    px(13,32-la,9,3,'#000');
  px(24,14,5,3,'#aa5500'); px(27,17,4,4,'#aa5500');
  // Frozen tint
  if (d.frozen > 0) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#88ddff';
    ctx.fillRect(0, -9, d.w, d.h + 9);
    ctx.globalAlpha = 1;
    // Ice crystals
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(2, -10, 3, 3); ctx.fillRect(17, -10, 3, 3);
    ctx.fillRect(8, 34, 3, 3);  ctx.fillRect(13, 34, 3, 3);
  }
  ctx.restore();
}

function drawCoin(c) {
  if (c.got) return;
  const sx = Math.round(c.x - camera.x);
  if (sx < -20 || sx > W+20) return;
  const bob = Math.sin(c.anim * Math.PI/2) * 2;
  const sy  = Math.round(c.y + bob);
  px(sx+1, sy, 6, 8, '#ffff00'); px(sx+2, sy+1, 2, 2, '#ffffff');
}

function drawPowerup(pu) {
  if (pu.got) return;
  const sx = Math.round(pu.x - camera.x);
  if (sx < -20 || sx > W+20) return;
  const bob = Math.sin(pu.anim * Math.PI/2) * 2;
  const sy  = Math.round(pu.y + bob);

  if (pu.kind === 'redFlower') {
    px(sx+5, sy+9, 2, 5, '#22aa22');  // stem
    px(sx+3, sy+3, 6, 5, '#dd1111');  // petals
    px(sx+1, sy+5, 10, 3, '#dd1111');
    px(sx+4, sy+1, 4, 3, '#dd1111');
    px(sx+4, sy+4, 4, 4, '#ffff00');  // center
  } else if (pu.kind === 'iceFlower') {
    px(sx+5, sy+9, 2, 5, '#22aa22');  // stem
    px(sx+3, sy+3, 6, 5, '#44aaff');  // petals
    px(sx+1, sy+5, 10, 3, '#44aaff');
    px(sx+4, sy+1, 4, 3, '#44aaff');
    px(sx+4, sy+4, 4, 4, '#ffffff');  // center
    px(sx+5, sy+5, 2, 2, '#aaeeff');
  } else if (pu.kind === 'hammer') {
    px(sx+5, sy+4, 3, 10, '#8B4513');
    px(sx+1, sy+2, 10, 5, '#888888');
    px(sx+2, sy+1, 8,  2, '#aaaaaa');
  } else if (pu.kind === 'redMushroom') {
    px(sx+4, sy+7, 4, 7, '#ddaa88');   // stem
    px(sx+1, sy+1, 10, 8, '#dd1111');  // cap
    px(sx+2, sy,   8,  3, '#dd1111');
    px(sx+3, sy+2, 2, 2, '#ffffff');   // dots
    px(sx+7, sy+3, 2, 2, '#ffffff');
    px(sx+2, sy+5, 2, 2, '#ffffff');
  } else if (pu.kind === 'blueMushroom') {
    px(sx+4, sy+7, 4, 7, '#ddaa88');   // stem
    px(sx+1, sy+1, 10, 8, '#0044ff');  // cap
    px(sx+2, sy,   8,  3, '#0044ff');
    px(sx+3, sy+2, 2, 2, '#aaccff');   // dots
    px(sx+7, sy+3, 2, 2, '#aaccff');
    px(sx+2, sy+5, 2, 2, '#aaccff');
    // Glow effect
    ctx.globalAlpha = 0.3 + 0.2*Math.sin(pu.anim*Math.PI);
    px(sx-1, sy-1, 14, 16, '#0088ff');
    ctx.globalAlpha = 1;
  }
}

function drawFireball(fb) {
  const sx = Math.round(fb.x - camera.x);
  if (sx < -20 || sx > W+20) return;
  const sy = Math.round(fb.y);
  if (fb.kind === 'fire') {
    px(sx+1,sy+1,6,6,'#ff4400');
    px(sx+2,sy,  4,3,'#ffaa00');
    px(sx+3,sy+2,2,3,'#ffff00');
  } else {
    px(sx+1,sy+1,6,6,'#0088cc');
    px(sx+2,sy,  4,3,'#44ccff');
    px(sx+3,sy+2,2,3,'#ffffff');
  }
}

function drawParticles() {
  // Group by colour to minimise fillStyle changes
  const byCol = {};
  for (const p of particles) {
    (byCol[p.col] = byCol[p.col] || []).push(p);
  }
  for (const col in byCol) {
    ctx.fillStyle = col;
    for (const p of byCol[col])
      ctx.fillRect((p.x - camera.x + 0.5) | 0, p.y | 0, 2, 2);
  }
}

function drawFloatingTexts() {
  for (const ft of floatingTexts)
    txt(ft.text, (ft.x - camera.x + 0.5) | 0, ft.y | 0, 10, ft.col, false);
}

function drawFlag() {
  const fx = Math.round((LW-3)*TILE - camera.x);
  if (fx < -40 || fx > W+40) return;
  const groundY = GROUND_Y*TILE;
  if (currentLevel === 4) {
    // Level 5: princess only shown after DB boss is spawned AND defeated
    if (!dbBoss || dbBoss.alive) return;
    const py = groundY - 32;
    // Dress (#00FF00 green)
    px(fx+2, py+14, 14, 18, '#00ff00'); // skirt
    px(fx+5, py+8,  8, 10, '#00ff00'); // torso
    // Skin
    px(fx+6, py,    6,  9, '#ffcc88'); // head
    px(fx+6, py+9,  6,  6, '#ffcc88'); // neck+shoulders
    // Hair (blonde)
    px(fx+5, py-2,  8,  5, '#ffdd00');
    px(fx+4, py+2,  2,  6, '#ffdd00');
    px(fx+12,py+2,  2,  6, '#ffdd00');
    // Crown
    px(fx+5, py-4,  8,  3, '#ffdd00');
    px(fx+6, py-6,  2,  3, '#ffdd00');
    px(fx+10,py-6,  2,  3, '#ffdd00');
    px(fx+8, py-7,  2,  4, '#ff0000');
    // Eyes
    px(fx+7, py+3,  2,  2, '#000');
    px(fx+10,py+3,  2,  2, '#000');
    // Smile
    px(fx+7, py+7,  4,  1, '#000');
    // Arms
    px(fx+2, py+9,  4, 8, '#00ff00');

// ── 1982 Glitch System ─────────────────────────
const glitch = {
  tear: 0, tearY: 0, tearH: 0, tearShift: 0,   // screen tear
  noise: 0,                                       // random pixel scatter
  tint: 0, tintCol: '',                           // full-screen color flash
  scoreGarble: 0, scoreVal: '',                   // HUD score corruption
  timerGarble: 0, timerVal: 0,                    // HUD timer corruption
  ghosts: [],                                     // dead-enemy ghost flashes [{x,y,w,h,col,t}]
  scanFlicker: 0,                                 // scanline row flicker
};

function tickGlitches() {
  if (glitch.tear   > 0) glitch.tear--;
  if (glitch.noise  > 0) glitch.noise--;
  if (glitch.tint   > 0) glitch.tint--;
  if (glitch.scoreGarble > 0) glitch.scoreGarble--;
  if (glitch.timerGarble > 0) glitch.timerGarble--;
  if (glitch.scanFlicker > 0) glitch.scanFlicker--;
  for (let i = glitch.ghosts.length-1; i >= 0; i--) { glitch.ghosts[i].t--; if (glitch.ghosts[i].t <= 0) glitch.ghosts.splice(i,1); }

  const r = Math.random;
  // Screen tear: rare horizontal band shifts sideways
  if (!glitch.tear && r() < 0.0018) {
    glitch.tear     = 2 + (r()*3|0);
    glitch.tearY    = (r() * (H-10)) | 0;
    glitch.tearH    = 1 + (r()*8|0);
    glitch.tearShift = ((r()*24|0)+4) * (r()<0.5?1:-1);
  }
  // Random pixel scatter
  if (!glitch.noise && r() < 0.0025) glitch.noise = 1 + (r()*2|0);
  // Full-screen color tint flash
  if (!glitch.tint && r() < 0.0008) {
    glitch.tint = 1;
    const c = r();
    glitch.tintCol = c < 0.4 ? 'rgba(255,0,0,0.12)' : c < 0.7 ? 'rgba(0,80,255,0.1)' : 'rgba(255,255,255,0.08)';
  }
  // Score digit garble
  if (!glitch.scoreGarble && r() < 0.0012) {
    glitch.scoreGarble = 1;
    glitch.scoreVal = String(score).split('').map(d => r()<0.4 ? '0123456789ABCDEF'[r()*16|0] : d).join('');
  }
  // Timer digit garble
  if (!glitch.timerGarble && r() < 0.001) {
    glitch.timerGarble = 1;
    glitch.timerVal = (Math.ceil(levelTimer/60) + ((r()*40|0)-20)) | 0;
  }
  // Scanline row flicker
  if (!glitch.scanFlicker && r() < 0.002) glitch.scanFlicker = 1 + (r()*3|0);
}

function spawnGlitchGhost(d) {
  if (glitch.ghosts.length < 4 && Math.random() < 0.3) {
    glitch.ghosts.push({ x: d.x, y: d.y, w: d.w, h: d.h, col: '#884400', t: 4 + (Math.random()*4|0) });
  }
}

function drawGlitches() {
  // Scanline row flicker: random horizontal strips of inverted brightness
  if (glitch.scanFlicker > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = 'rgba(80,80,80,0.18)';
    for (let y = (Math.random()*8|0); y < H; y += 8 + (Math.random()*6|0))
      ctx.fillRect(0, y, W, 1 + (Math.random()*2|0));
    ctx.restore();
  }
  // Screen tear: copy strip offset (draw solid garble band)
  if (glitch.tear > 0) {
    // Draw the strip from the already-rendered canvas, shifted
    ctx.drawImage(ctx.canvas, 0, glitch.tearY, W, glitch.tearH,
                              glitch.tearShift, glitch.tearY, W, glitch.tearH);
    // Add RGB noise in the seam
    for (let x = 0; x < W; x += 3) {
      if (Math.random() < 0.35) {
        ctx.fillStyle = `rgb(${Math.random()*255|0},${Math.random()*255|0},${Math.random()*255|0})`;
        ctx.fillRect(x, glitch.tearY, 3, glitch.tearH);
      }
    }
  }
  // Random pixel scatter
  if (glitch.noise > 0) {
    const count = 6 + (Math.random()*12|0);
    for (let i = 0; i < count; i++) {
      ctx.fillStyle = `rgb(${Math.random()*255|0},${Math.random()*255|0},${Math.random()*255|0})`;
      ctx.fillRect(Math.random()*W|0, Math.random()*H|0, 2, 2);
    }
  }
  // Full-screen tint
  if (glitch.tint > 0) {
    ctx.fillStyle = glitch.tintCol;
    ctx.fillRect(0, 0, W, H);
  }
  // Ghost sprites of dead enemies
  for (const g of glitch.ghosts) {
    if (g.t % 2 === 0) {
      ctx.fillStyle = g.col;
      ctx.fillRect(Math.round(g.x - camera.x), Math.round(g.y), g.w, g.h);
    }
  }
}

// ── Render ─────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  if (state === 'menu')        { drawMenu(); return; }
  if (state === 'levelselect') { drawLevelSelect(); return; }
  if (state === 'tutorial')    { drawTutorial(); return; }

  ctx.save();
  if (shakeFrames > 0)
    ctx.translate((Math.random()-0.5)*shakeMag*2, (Math.random()-0.5)*shakeMag*2);

  if (state !== 'playing' && state !== 'dying' && state !== 'paused' && state !== 'dead' && state !== 'win') { ctx.restore(); return; }

  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  const tx0 = Math.floor(camera.x/TILE), tx1 = Math.ceil((camera.x+W)/TILE);
  for (let ty = 0; ty < LH; ty++)
    for (let tx = tx0; tx <= tx1; tx++) { const t = getTile(tx,ty); if (t>0) drawTile(tx,ty,t); }

  drawFlag();
  for (const c of coins)    drawCoin(c);
  for (const pu of powerups) drawPowerup(pu);
  for (const fb of fireballs) drawFireball(fb);
  for (const d of donkeys)  drawDonkey(d);
  drawBarrels();
  drawDBBoss();
  drawParticles();
  drawFloatingTexts();
  drawPlayer();
  drawGlitches();

  ctx.restore();
  drawHUD();

  if (state === 'paused') drawPaused();
  if (state === 'dead')   { drawDead(); }
  if (state === 'win')    drawWin();
}

// ── Loop ───────────────────────────────────────
function loop() {
  if (state === 'menu') {
    if (keys['ArrowLeft']  || keys['KeyA']) { keys['ArrowLeft']=keys['KeyA']=false; mainMenuItem = 0; }
    if (keys['ArrowRight'] || keys['KeyD']) { keys['ArrowRight']=keys['KeyD']=false; mainMenuItem = 1; }
    if (keys['Enter']) {
      keys['Enter'] = false;
      if (mainMenuItem === 1) {
        tutorialPage = 0; tutorialReturn = 'menu'; state = 'tutorial';
      } else {
        menuSelection = 0; state = 'levelselect';
      }
    }
  }
  if (state === 'levelselect') {
    if (keys['ArrowUp']   || keys['KeyW']) { keys['ArrowUp']=keys['KeyW']=false; menuSelection = Math.max(0,menuSelection-1); }
    if (keys['ArrowDown'] || keys['KeyS']) { keys['ArrowDown']=keys['KeyS']=false; menuSelection = Math.min(LEVELS.length-1,menuSelection+1); }
    if (keys['Enter']) {
      keys['Enter'] = false;
      if (menuSelection < unlockedLevels) {
        // Show tutorial first time playing level 1
        if (menuSelection === 0 && !localStorage.getItem(TUTORIAL_SEEN_KEY)) {
          tutorialPage = 0; tutorialReturn = 'newgame'; state = 'tutorial';
        } else {
          resetGame(menuSelection);
        }
      }
    }
    if (keys['Escape']) { keys['Escape']=false; state='menu'; }
  }
  if (state === 'tutorial') {
    const isLast = tutorialPage === TUTORIAL_PAGES.length - 1;
    if (keys['ArrowRight'] || keys['Enter']) {
      keys['ArrowRight'] = keys['Enter'] = false;
      if (isLast) {
        localStorage.setItem(TUTORIAL_SEEN_KEY, '1');
        if (tutorialReturn === 'newgame') { resetGame(0); }
        else if (tutorialReturn === 'paused') { state = 'paused'; }
        else if (tutorialReturn === 'dead') { state = 'dead'; }
        else if (tutorialReturn === 'levelselect') { state = 'levelselect'; }
        else { state = 'menu'; }
      } else {
        tutorialPage++;
      }
    }
    if (keys['ArrowLeft']) {
      keys['ArrowLeft'] = false;
      tutorialPage = Math.max(0, tutorialPage - 1);
    }
    if (keys['Escape']) {
      keys['Escape'] = false;
      if (tutorialReturn === 'paused') state = 'paused';
      else if (tutorialReturn === 'dead') state = 'dead';
      else if (tutorialReturn === 'levelselect') state = 'levelselect';
      else state = 'menu';
    }
  }
  if (state === 'paused') {
    if (keys['ArrowUp']   || keys['KeyW']) { keys['ArrowUp']=keys['KeyW']=false; pauseSelection=(pauseSelection+3)%4; }
    if (keys['ArrowDown'] || keys['KeyS']) { keys['ArrowDown']=keys['KeyS']=false; pauseSelection=(pauseSelection+1)%4; }
    if (keys['Enter']) {
      keys['Enter'] = false;
      if (pauseSelection===0) { state='playing'; bgmPlay(); }
      else if (pauseSelection===1) { resetGame(currentLevel); }
      else if (pauseSelection===2) { tutorialPage=0; tutorialReturn='paused'; state='tutorial'; }
      else { bgmStop(); state='menu'; }
    }
  }
  if (state === 'levelselect' && keys['KeyT']) { keys['KeyT']=false; tutorialPage=0; tutorialReturn='levelselect'; state='tutorial'; }
  if (state === 'dead' && keys['Enter'])  { keys['Enter']=false; resetGame(currentLevel); }
  if (state === 'dead' && keys['KeyT'])   { keys['KeyT']=false; tutorialPage=0; tutorialReturn='dead'; state='tutorial'; }
  if (state === 'win'  && keys['Enter'])  { keys['Enter']=false; currentLevel+1 < LEVELS.length ? resetGame(currentLevel+1) : (state='menu'); }
  if (state === 'win'  && keys['KeyM'])   { keys['KeyM']=false; state='menu'; }

  update();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
  </script>
